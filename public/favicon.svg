<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

  <g transform="translate(0, 0) scale(1)">
    <defs>
      <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Left page -->
    <path d="M 250 400 Q 150 450 50 350 L 50 150 Q 150 250 250 200 Z" fill="url(#grad1)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M 250 400 Q 350 450 450 350 L 450 150 Q 350 250 250 200 Z" fill="url(#grad2)" opacity="0.9"/>
    
    <!-- Network nodes popping out -->
    <circle cx="250" cy="150" r="25" fill="#8b5cf6" />
    <circle cx="150" cy="80" r="18" fill="#3b82f6" />
    <circle cx="350" cy="80" r="18" fill="#10b981" />
    
    <line x1="250" y1="200" x2="250" y2="150" stroke="#8b5cf6" stroke-width="8" />
    <line x1="250" y1="150" x2="150" y2="80" stroke="#3b82f6" stroke-width="8" />
    <line x1="250" y1="150" x2="350" y2="80" stroke="#10b981" stroke-width="8" />
  </g>

</svg>